    <title>CROP-X</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #fef9c3, #bbf7d0);
            font-family: 'Inter', sans-serif;
        }
        .feature-card {
            transition: transform 0.3s;
        }
        .feature-card:hover {
            transform: scale(1.05);
        }
        .feature-title {
            font-weight: 600;
            color: #047857;
        }
        .header-text span {
            display: inline-block;
        }
    </style>
</head>

                <option value="pa">Punjabi</option>

        </div>

            <img src="https://img.icons8.com/fluency/96/tractor.png" alt="Machinery" class="w-24 h-24" />
            <h3 class="mt-2 sm:mt-4 text-lg sm:text-xl feature-title" data-en="Machinery & Tools Rent" data-mr="यंत्रसामग्री व उपकरण भाडे" data-pa="ਮਸ਼ੀਨਰੀ ਅਤੇ ਟੂਲ ਕਿਰਾਏ">Machinery & Tools Rent</h3>

            <h3 class="mt-2 sm:mt-4 text-lg sm:text-xl feature-title" data-en="Contract Farming Guidance" data-mr="करार शेती मार्गदर्शन" data-pa="ਠੇਕੇਦਾਰੀ ਖੇਤੀ ਮਾਰਗਦਰਸ਼ਨ">Contract Farming Guidance</h3>
        </a>

    </main>

    <script>
        const langSelect = document.getElementById('language-select');
        langSelect.addEventListener('change', () => {
            const lang = langSelect.value;
            document.querySelectorAll('.feature-title').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            const headerDesc = document.getElementById('header-desc');
            headerDesc.textContent = lang === 'mr' ? 'लहान शेतकऱ्यांसाठी स्मार्ट साधने' :
                                     lang === 'pa' ? 'ਛੋਟੇ ਕਿਸਾਨਾਂ ਲਈ ਸਮਾਰਟ ਟੂਲ' : 'Smart Tools for Small Farmers';
        });
    </script>

</body>
</html>
